<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="aboutTitle">True Resonance - About</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="about.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <img src="images/logo.svg" alt="True Resonance" class="logo" />
        <h1>True Resonance</h1>
        <p data-i18n="subtitle">Play music in healing frequencies</p>
      </header>

      <main>
        <section class="info-section">
          <h2 data-i18n="aboutExtensionInfo">Extension Information</h2>
          <div class="info-grid">
            <div class="info-item">
              <span data-i18n="aboutName">Name:</span>
              <span>True Resonance</span>
            </div>

            <div class="info-item">
              <span data-i18n="aboutVersion">Version:</span>
              <span id="version">—</span>
            </div>

            <div class="info-item">
              <span data-i18n="aboutAuthor">Author:</span>
              <span>RafaCMur</span>
            </div>
          </div>
        </section>

        <section class="links-section">
          <h2 data-i18n="aboutLinks">Links</h2>
          <div class="links">
            <a
              href="https://github.com/RafaCMur/true-resonance"
              target="_blank"
              class="link"
              data-i18n="aboutGitHub"
            >
              GitHub Repository
            </a>
            <a
              href="https://www.paypal.com/donate/?hosted_button_id=TJYW36JX2NY48"
              target="_blank"
              class="link"
              data-i18n="aboutDonate"
            >
              Support Development
            </a>
          </div>
          <p class="contact" data-i18n="aboutContact">
            Questions? rafacmurdev@gmail.com
          </p>
        </section>
      </main>
    </div>
    <script>
      document.getElementById("version").textContent =
        chrome.runtime.getManifest().version;

      (async function () {
        try {
          const result = await new Promise(function (resolve) {
            chrome.storage.local.get(["language"], resolve);
          });
          const lang = result.language || "en";
          const resp = await fetch("i18n/locales/" + lang + ".json");
          if (!resp.ok) throw new Error("failed to load i18n");
          const translations = await resp.json();
          document.querySelectorAll("[data-i18n]").forEach(function (el) {
            var key = el.getAttribute("data-i18n");
            if (key && translations[key]) {
              el.textContent = translations[key];
            }
          });
          if (translations.aboutTitle) {
            document.title = translations.aboutTitle;
          }
        } catch (e) {
          console.warn("True Resonance: about page i18n failed", e);
        }
      })();
    </script>
  </body>
</html>
